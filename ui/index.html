<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Laplace Control Panel</title>
    
    <!-- Material Icons -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              laplace: {
                bg: '#f8fafc',       /* Slate-50: Cleaner background */
                accent: '#fff1f2',   /* Rose-50: Softer accent */
                primary: '#e11d48',  /* Rose-600: Professional Red/Pink */
                secondary: '#475569',/* Slate-600 */
                dark: '#1e293b',     /* Slate-800 */
                darker: '#0f172a',   /* Slate-900 */
                black: '#020617',    /* Slate-950 */
                border: '#e2e8f0'    /* Slate-200 */
              }
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              mono: ['JetBrains Mono', 'Fira Code', 'monospace']
            },
            boxShadow: {
              'soft': '0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03)',
              'glow': '0 0 15px rgba(225, 29, 72, 0.3)'
            }
          }
        }
      }
    </script>
<link rel="stylesheet" href="/index.css">
<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap');
    body { font-family: 'Inter', sans-serif; }
</style>
</head>
  <body class="bg-laplace-bg text-laplace-darker antialiased selection:bg-laplace-primary selection:text-white overflow-hidden">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
